<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS 1</title>
</head>
<body>
    <script>
        let numberOfFilms = prompt('Сколько фильмов вы уже посмотрели?');

        let personalMoviedDB = {
            count: numberOfFilms,
            movies: {},
            actors: {},
            genres: [],
            private: false,
        };

        let lastMovie = prompt('Один из последних просмотренных фильмов?'),
            scoresAnswer = prompt('На сколько оцените фильм?', 'От 1 до 5'),
            lastMovie2 = prompt('Один из последних просмотренных фильмов?'),
            scoresAnswer2 = prompt('На сколько оцените фильм?', 'От 1 до 5');

        personalMoviedDB.movies[lastMovie] = scoresAnswer;
        personalMoviedDB.movies[lastMovie2] = scoresAnswer2;
        console.log(personalMoviedDB);


    </script>
</body>
</html>
