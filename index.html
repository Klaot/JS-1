<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS 1</title>
</head>
<body>
    <p id="one"></p>
    <script>
        let numberOfFilms
        
        let personalMoviedDB = {
            count: numberOfFilms,
            movies: {},
            actors: {},
            genres: [],
            private: false,
        };

        
        showMyDB()
        start();
        detectPersonalLvl();
        rememberMyFilms();
        writeYoreGenris();


        function showMyDB() {

            let private = personalMoviedDB.private;
            
            if(private === false) {
                console.log(personalMoviedDB);
            }
            
        };

        function writeYoreGenris() {

            for(let i = 1; i <= 3; i++) {
                personalMoviedDB.genres.push(prompt(`Ваш любимый жанр под номером: ${i}.`));
            }
        }
        


        
        function start() {
            numberOfFilms = +prompt('Сколько фильмов вы уже посмотрели?');

            while (numberOfFilms == null || numberOfFilms == '' || isNaN(numberOfFilms)) {
                numberOfFilms = +prompt('Сколько фильмов вы уже посмотрели?');
            }
        }
           
        

        function rememberMyFilms() {

            for (let i = 0 ; i < 1; i++) {
            let lastMovie = prompt('Один из последних просмотренных фильмов?');

                if ( lastMovie === null || lastMovie.length > 50 || lastMovie === "" ) {   
                    alert('Некоректные данные!')
                    i--  

                } else {
                    
                    for (let i = 0 ; i < 1; i++) {

                       let scoresAnswer = +prompt('На сколько оцените фильм?');

                    if ( scoresAnswer != null && scoresAnswer <= 5 && scoresAnswer != 0) {
                        personalMoviedDB.movies[lastMovie] = scoresAnswer;

                        let p = document.querySelector('#one');
                        p.textContent = `Фильм: ${lastMovie} Оценка: ${scoresAnswer}` ;

                    } else {
                        alert('Оцените числом от 1 до 5')
                        i--
                    }
                    }
                    
                }  
        }
        }

        

        function detectPersonalLvl() {

            if (isNaN(numberOfFilms)) {
                    alert('Введите число! Перезагрузите страницу!');
                    
                } else if (numberOfFilms < 10) {
                    alert('Просмотренно довольно мало фильмов :(');

                } else if (numberOfFilms > 10 && numberOfFilms <= 30) {
                    alert('Вы класический зритель!')

                } else if (numberOfFilms > 30) {
                    alert('Вы киноман!')
                }
        }

        
            

            
    </script>
</body>
</html>
